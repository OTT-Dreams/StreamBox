<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineSync — Watch Party</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#080810;
  --surface:#0e0e1a;
  --card:#14142a;
  --card2:#1c1c34;
  --accent:#e63946;
  --accent2:#457b9d;
  --gold:#ffd60a;
  --text:#f1faee;
  --muted:#6b7280;
  --border:rgba(255,255,255,0.07);
  --admin-glow:rgba(230,57,70,0.4);
  --green:#06d6a0;
  --orange:#fb8500;
}

body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* NOISE */
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;border-bottom:1px solid var(--border);background:rgba(8,8,16,.96);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100}

.logo{display:flex;align-items:center;gap:10px}
.logo-mark{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:2px;color:var(--accent);line-height:1}
.logo-sub{font-size:.65rem;font-family:'JetBrains Mono',monospace;color:var(--muted);letter-spacing:3px;text-transform:uppercase}

.header-right{display:flex;align-items:center;gap:10px}

.role-badge{font-family:'JetBrains Mono',monospace;font-size:.7rem;padding:4px 12px;border-radius:4px;text-transform:uppercase;letter-spacing:2px}
.role-admin{background:rgba(230,57,70,.15);border:1px solid var(--accent);color:var(--accent)}
.role-viewer{background:rgba(69,123,157,.15);border:1px solid var(--accent2);color:var(--accent2)}

.viewers-count{display:flex;align-items:center;gap:6px;font-size:.8rem;color:var(--muted)}
.live-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:livePulse 1.5s ease-in-out infinite}
@keyframes livePulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(6,214,160,.5)}50%{opacity:.7;box-shadow:0 0 0 6px rgba(6,214,160,0)}}

/* LAYOUT */
.app{display:grid;grid-template-columns:1fr 320px;min-height:calc(100vh - 57px);gap:0}

/* MAIN VIDEO SIDE */
.video-side{display:flex;flex-direction:column;border-right:1px solid var(--border)}

/* URL BAR (admin only) */
.url-bar{padding:1rem 1.5rem;border-bottom:1px solid var(--border);background:var(--surface);display:flex;gap:10px}
.url-bar.hidden{display:none}
.url-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.7rem 1rem;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.8rem;outline:none;transition:border-color .2s}
.url-input:focus{border-color:var(--accent)}
.url-input::placeholder{color:var(--muted)}
.btn-go{padding:.7rem 1.4rem;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.85rem;cursor:pointer;transition:opacity .2s,transform .1s;white-space:nowrap}
.btn-go:hover{opacity:.85}
.btn-go:active{transform:scale(.97)}

/* VIDEO PLAYER */
.player-container{position:relative;background:#000;flex:1;min-height:300px;display:flex;align-items:center;justify-content:center}
#videoEl{width:100%;max-height:60vh;display:none;background:#000}

.idle-screen{text-align:center;color:var(--muted);padding:3rem}
.idle-icon{font-size:4rem;margin-bottom:1rem;opacity:.3}
.idle-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:2px;color:var(--muted);margin-bottom:.5rem}
.idle-sub{font-size:.85rem}

/* SYNC OVERLAY */
.sync-overlay{position:absolute;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:50}
.sync-overlay.show{display:flex}
.sync-spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sync-text{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--muted)}

/* ADMIN CONTROLS */
.controls-bar{padding:1rem 1.5rem;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;gap:12px}
.ctrl-btn{width:40px;height:40px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,border-color .2s,transform .1s}
.ctrl-btn:hover{background:var(--card);border-color:var(--accent)}
.ctrl-btn:active{transform:scale(.92)}
.ctrl-btn.disabled{opacity:.35;cursor:not-allowed;pointer-events:none}

.ctrl-btn.play-pause{width:50px;height:50px;background:var(--accent);border-color:var(--accent);border-radius:50%;font-size:1.1rem}
.ctrl-btn.play-pause:hover{background:#c1121f;border-color:#c1121f}

.time-display{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--muted);margin-left:4px}

.seek-wrap{flex:1;display:flex;align-items:center;gap:10px}
.seek-track{flex:1;height:4px;background:var(--card2);border-radius:2px;cursor:pointer;position:relative;overflow:visible}
.seek-filled{height:100%;background:var(--accent);border-radius:2px;pointer-events:none;max-width:100%}
.seek-thumb{position:absolute;top:50%;right:0;transform:translate(50%,-50%);width:12px;height:12px;background:var(--text);border-radius:50%;border:2px solid var(--accent);pointer-events:none;opacity:0;transition:opacity .2s}
.seek-track:hover .seek-thumb{opacity:1}

.vol-wrap{display:flex;align-items:center;gap:6px}
.vol-icon{font-size:.9rem;cursor:pointer;color:var(--muted)}
.vol-slider{-webkit-appearance:none;width:70px;height:3px;background:var(--card2);border-radius:2px;cursor:pointer}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--text);border-radius:50%;cursor:pointer}

/* VIEWER CONTROL BAR */
.viewer-bar{padding:1rem 1.5rem;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;gap:12px}
.viewer-bar.hidden{display:none}
.sync-status{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--muted)}
.sync-indicator{width:8px;height:8px;border-radius:50%;background:var(--green)}
.sync-indicator.synced{background:var(--green)}
.sync-indicator.desynced{background:var(--orange);animation:livePulse 1s ease-in-out infinite}

/* CHAT + RIGHT SIDE */
.chat-side{display:flex;flex-direction:column;background:var(--surface)}

.chat-header{padding:1rem 1.2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.chat-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;color:var(--text)}
.chat-tabs{display:flex;gap:4px}
.tab-btn{padding:4px 14px;background:transparent;border:1px solid transparent;border-radius:6px;color:var(--muted);font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s}
.tab-btn.active{background:var(--card2);border-color:var(--border);color:var(--text)}

/* MESSAGES */
.messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:8px;min-height:0}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:var(--card2)}

.msg{display:flex;gap:8px;align-items:flex-start}
.msg-avatar{width:28px;height:28px;border-radius:6px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0;font-weight:600}
.msg-body{}
.msg-name{font-size:.7rem;font-weight:600;margin-bottom:2px}
.msg-name.admin-name{color:var(--accent)}
.msg-name.viewer-name{color:var(--accent2)}
.msg-text{font-size:.82rem;color:var(--text);line-height:1.5;background:var(--card);border-radius:0 8px 8px 8px;padding:6px 10px;display:inline-block;max-width:220px;word-break:break-word}

.msg-system{text-align:center;font-size:.7rem;color:var(--muted);font-family:'JetBrains Mono',monospace;padding:4px 0}

/* VOICE CHAT */
.voice-section{padding:1rem;border-top:1px solid var(--border)}
.voice-header{font-size:.7rem;font-family:'JetBrains Mono',monospace;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:.75rem}
.voice-users{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:.75rem;min-height:36px}
.voice-user{display:flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:.75rem}
.voice-user.speaking{border-color:var(--green);box-shadow:0 0 8px rgba(6,214,160,.3)}
.voice-dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
.voice-user.speaking .voice-dot{background:var(--green);animation:livePulse 1s infinite}
.voice-empty{font-size:.75rem;color:var(--muted);align-self:center}

.btn-voice{width:100%;padding:.65rem;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-weight:600;font-size:.85rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-voice:hover{border-color:var(--green);color:var(--green)}
.btn-voice.active{background:rgba(6,214,160,.15);border-color:var(--green);color:var(--green)}
.btn-voice.active:hover{background:rgba(6,214,160,.25)}

/* CHAT INPUT */
.chat-input-row{padding:1rem;border-top:1px solid var(--border);display:flex;gap:8px}
.chat-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.65rem .9rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.82rem;outline:none;transition:border-color .2s;resize:none}
.chat-input:focus{border-color:var(--accent2)}
.chat-input::placeholder{color:var(--muted)}
.btn-send{padding:.65rem 1rem;background:var(--accent2);border:none;border-radius:8px;color:#fff;font-size:.9rem;cursor:pointer;transition:opacity .2s}
.btn-send:hover{opacity:.85}

/* JOIN MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem;width:380px;max-width:90vw}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:3px;margin-bottom:.25rem;color:var(--text)}
.modal-sub{font-size:.85rem;color:var(--muted);margin-bottom:1.5rem;line-height:1.6}
.modal-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;margin-bottom:10px;transition:border-color .2s}
.modal-input:focus{border-color:var(--accent)}
.modal-input::placeholder{color:var(--muted)}
.role-select{display:flex;gap:8px;margin-bottom:1.25rem}
.role-opt{flex:1;padding:.65rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:.82rem;font-weight:600;cursor:pointer;text-align:center;transition:all .2s}
.role-opt.selected.admin{background:rgba(230,57,70,.15);border-color:var(--accent);color:var(--accent)}
.role-opt.selected.viewer{background:rgba(69,123,157,.15);border-color:var(--accent2);color:var(--accent2)}
.btn-join{width:100%;padding:.8rem;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;transition:opacity .2s}
.btn-join:hover{opacity:.85}

/* VIEWERS LIST in chat tab */
.viewers-list{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:8px}
.viewer-item{display:flex;align-items:center;gap:10px;padding:.65rem .9rem;background:var(--card);border-radius:8px}
.v-avatar{width:32px;height:32px;border-radius:8px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700}
.v-name{font-size:.85rem;font-weight:500}
.v-role{font-size:.68rem;font-family:'JetBrains Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.v-role.admin{color:var(--accent)}
.v-role.viewer{color:var(--accent2)}

/* hidden */
.hidden{display:none!important}

@media(max-width:700px){
  .app{grid-template-columns:1fr}
  .chat-side{max-height:45vh}
  .voice-section{display:none}
}
</style>
</head>
<body>

<!-- JOIN MODAL -->
<div class="modal-overlay" id="joinModal">
  <div class="modal">
    <div class="modal-title">CINESYNC</div>
    <div class="modal-sub">একসাথে মুভি দেখো। Admin ভিডিও কন্ট্রোল করে, সবাই একই সময়ে দেখে।</div>
    <input class="modal-input" id="nameInput" placeholder="তোমার নাম লেখো..." maxlength="20"/>
    <div class="role-select">
      <div class="role-opt admin selected" id="roleAdmin" onclick="selectRole('admin')">🎬 Admin</div>
      <div class="role-opt viewer" id="roleViewer" onclick="selectRole('viewer')">👁 Viewer</div>
    </div>
    <div id="adminKeyWrap" style="margin-bottom:10px">
      <input class="modal-input" id="adminKey" placeholder="Admin পাসওয়ার্ড (ঐচ্ছিক)..." type="password" style="margin-bottom:0"/>
    </div>
    <button class="btn-join" onclick="joinRoom()">▶ রুমে যোগ দাও</button>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">
    <div>
      <div class="logo-mark">CineSync</div>
      <div class="logo-sub">Watch Party Engine</div>
    </div>
  </div>
  <div class="header-right">
    <div class="viewers-count"><div class="live-dot"></div><span id="viewerCountDisplay">0 দর্শক</span></div>
    <div class="role-badge role-admin hidden" id="adminBadge">Admin</div>
    <div class="role-badge role-viewer hidden" id="viewerBadge">Viewer</div>
  </div>
</header>

<!-- APP -->
<div class="app">
  <!-- VIDEO SIDE -->
  <div class="video-side">
    <!-- URL bar (admin only) -->
    <div class="url-bar hidden" id="urlBar">
      <input class="url-input" id="urlInput" placeholder="ভিডিও লিংক পেস্ট করুন (MP4, YouTube, Google Drive)..." />
      <button class="btn-go" onclick="adminLoadVideo()">▶ লোড</button>
    </div>

    <!-- Player -->
    <div class="player-container" id="playerContainer">
      <div class="idle-screen" id="idleScreen">
        <div class="idle-icon">🎬</div>
        <div class="idle-title">কোনো ভিডিও নেই</div>
        <div class="idle-sub" id="idleSubText">Admin ভিডিও লোড করলে শুরু হবে...</div>
      </div>
      <video id="videoEl" controls></video>
      <iframe id="ytFrame" style="width:100%;max-height:60vh;border:none;display:none" allowfullscreen allow="autoplay; encrypted-media"></iframe>
      <div class="sync-overlay" id="syncOverlay">
        <div class="sync-spinner"></div>
        <div class="sync-text">সিঙ্ক হচ্ছে...</div>
      </div>
    </div>

    <!-- Admin controls -->
    <div class="controls-bar hidden" id="adminControls">
      <button class="ctrl-btn play-pause" id="playPauseBtn" onclick="adminPlayPause()" title="Play/Pause">▶</button>
      <button class="ctrl-btn" onclick="adminSeek(-10)" title="-10s">⏮</button>
      <button class="ctrl-btn" onclick="adminSeek(10)" title="+10s">⏭</button>
      <div class="seek-wrap">
        <span class="time-display" id="currentTimeDisplay">0:00</span>
        <div class="seek-track" id="seekTrack" onclick="adminSeekTo(event)">
          <div class="seek-filled" id="seekFilled" style="width:0%"></div>
          <div class="seek-thumb" id="seekThumb"></div>
        </div>
        <span class="time-display" id="durationDisplay">0:00</span>
      </div>
      <div class="vol-wrap">
        <span class="vol-icon" onclick="toggleMute()">🔊</span>
        <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)">
      </div>
    </div>

    <!-- Viewer sync bar -->
    <div class="viewer-bar hidden" id="viewerBar">
      <div class="sync-status">
        <div class="sync-indicator synced" id="syncIndicator"></div>
        <span id="syncStatusText">Admin এর সাথে সিঙ্ক হচ্ছে...</span>
      </div>
    </div>
  </div>

  <!-- CHAT SIDE -->
  <div class="chat-side">
    <div class="chat-header">
      <div class="chat-title">লাইভ চ্যাট</div>
      <div class="chat-tabs">
        <button class="tab-btn active" onclick="switchTab('chat',this)">💬 চ্যাট</button>
        <button class="tab-btn" onclick="switchTab('viewers',this)">👥 সদস্য</button>
      </div>
    </div>

    <!-- Chat tab -->
    <div id="chatTab" style="display:flex;flex-direction:column;flex:1;min-height:0">
      <div class="messages" id="messagesBox"></div>
      <!-- Voice -->
      <div class="voice-section">
        <div class="voice-header">// ভয়েস চ্যাট</div>
        <div class="voice-users" id="voiceUsers">
          <span class="voice-empty">কেউ কথা বলছে না...</span>
        </div>
        <button class="btn-voice" id="voiceBtn" onclick="toggleVoice()">🎤 ভয়েস চ্যাট চালু করো</button>
      </div>
      <!-- Input -->
      <div class="chat-input-row">
        <textarea class="chat-input" id="chatInput" placeholder="মেসেজ লেখো..." rows="1" onkeydown="chatKeydown(event)"></textarea>
        <button class="btn-send" onclick="sendChat()">➤</button>
      </div>
    </div>

    <!-- Viewers tab -->
    <div id="viewersTab" class="viewers-list hidden"></div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, push, serverTimestamp, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDQw9ksYuDM451LjtHpnUPoRx4Mh9zEOOE",
  authDomain: "movie-960db.firebaseapp.com",
  databaseURL: "https://movie-960db-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "movie-960db",
  storageBucket: "movie-960db.firebasestorage.app",
  messagingSenderId: "169250488305",
  appId: "1:169250488305:web:cc71dc93d3a3f698d20e50"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// State
let myName = '';
let myRole = 'viewer';
let myId = 'user_' + Math.random().toString(36).slice(2,9);
let isAdmin = false;
let videoEl = document.getElementById('videoEl');
let ytFrame = document.getElementById('ytFrame');
let isSyncing = false;
let isVoiceActive = false;
let voiceStream = null;
let peerConnections = {};
let currentVideoUrl = '';
let lastKnownTime = 0;
let isMuted = false;
let ADMIN_PASS = 'admin123';

// Avatars
const AVATARS = ['🎬','🍿','🎥','🎞','🌟','🎭','🦁','🐯','🦊','🐸','🌈','⚡'];
function getAvatar(name){ return AVATARS[name.charCodeAt(0) % AVATARS.length]; }

// ====== JOIN ======
window.selectRole = function(role){
  myRole = role;
  document.getElementById('roleAdmin').classList.toggle('selected', role==='admin');
  document.getElementById('roleAdmin').classList.toggle('admin', role==='admin');
  document.getElementById('roleViewer').classList.toggle('selected', role==='viewer');
  document.getElementById('roleViewer').classList.toggle('viewer', role==='viewer');
  document.getElementById('adminKeyWrap').style.display = role==='admin' ? 'block' : 'none';
};
selectRole('admin'); // default show

window.joinRoom = function(){
  const name = document.getElementById('nameInput').value.trim();
  if(!name){ document.getElementById('nameInput').style.borderColor='var(--accent)'; return; }
  
  if(myRole === 'admin'){
    const key = document.getElementById('adminKey').value.trim();
    if(key && key !== ADMIN_PASS){ alert('ভুল পাসওয়ার্ড!'); return; }
    isAdmin = true;
  }

  myName = name;
  document.getElementById('joinModal').style.display = 'none';
  initUI();
  connectFirebase();
};

function initUI(){
  if(isAdmin){
    document.getElementById('adminBadge').classList.remove('hidden');
    document.getElementById('urlBar').classList.remove('hidden');
    document.getElementById('adminControls').classList.remove('hidden');
    document.getElementById('idleSubText').textContent = 'উপরে লিংক পেস্ট করে লোড করুন...';
  } else {
    document.getElementById('viewerBadge').classList.remove('hidden');
    document.getElementById('viewerBar').classList.remove('hidden');
  }
  addSystemMsg(myName + ' রুমে যোগ দিলেন 🎉');
}

// ====== FIREBASE CONNECT ======
function connectFirebase(){
  // Presence
  const presenceRef = ref(db, `room/users/${myId}`);
  set(presenceRef, { name: myName, role: isAdmin ? 'admin' : 'viewer', joinedAt: Date.now() });
  onDisconnect(presenceRef).remove();

  // Watch users
  onValue(ref(db, 'room/users'), snap => {
    const users = snap.val() || {};
    renderViewers(users);
    const count = Object.keys(users).length;
    document.getElementById('viewerCountDisplay').textContent = count + ' দর্শক';
  });

  // Watch video state (non-admin syncs)
  onValue(ref(db, 'room/videoState'), snap => {
    const state = snap.val();
    if(!state) return;
    
    if(!isAdmin){
      syncVideoState(state);
    }
    
    // Load video if URL changed
    if(state.url && state.url !== currentVideoUrl){
      currentVideoUrl = state.url;
      loadVideoUrl(state.url, state.isYT);
    }
  });

  // Watch chat
  onValue(ref(db, 'room/chat'), snap => {
    const msgs = snap.val();
    if(!msgs) return;
    const box = document.getElementById('messagesBox');
    const keys = Object.keys(msgs).sort();
    // Only add new ones
    const existingIds = new Set([...box.querySelectorAll('[data-msgid]')].map(el=>el.dataset.msgid));
    keys.forEach(k => {
      if(!existingIds.has(k)){
        const m = msgs[k];
        appendChatMsg(m, k);
      }
    });
  });

  // Watch voice users
  onValue(ref(db, 'room/voice'), snap => {
    const voices = snap.val() || {};
    renderVoiceUsers(voices);
  });
}

// ====== VIDEO STATE SYNC ======
function pushVideoState(extra={}){
  if(!isAdmin) return;
  const state = {
    url: currentVideoUrl,
    isYT: ytFrame.style.display !== 'none',
    playing: !videoEl.paused,
    currentTime: videoEl.currentTime,
    serverTime: Date.now(),
    ...extra
  };
  set(ref(db,'room/videoState'), state);
}

function syncVideoState(state){
  if(isAdmin) return;
  if(ytFrame.style.display !== 'none') return; // YT handles itself
  if(!videoEl.src) return;

  // Calculate expected time accounting for server latency
  const lag = (Date.now() - state.serverTime) / 1000;
  const expectedTime = state.currentTime + (state.playing ? lag : 0);
  const diff = Math.abs(videoEl.currentTime - expectedTime);

  if(diff > 1.5){
    isSyncing = true;
    showSyncOverlay(true);
    videoEl.currentTime = expectedTime;
    setTimeout(()=>{ isSyncing=false; showSyncOverlay(false); }, 1500);
  }

  if(state.playing && videoEl.paused && !isSyncing){
    videoEl.play().catch(()=>{});
    updateSyncStatus(true);
  } else if(!state.playing && !videoEl.paused){
    videoEl.pause();
    updateSyncStatus(true);
  } else {
    updateSyncStatus(diff < 2);
  }
}

function showSyncOverlay(show){
  document.getElementById('syncOverlay').classList.toggle('show', show);
}

function updateSyncStatus(synced){
  const ind = document.getElementById('syncIndicator');
  const txt = document.getElementById('syncStatusText');
  ind.className = 'sync-indicator ' + (synced ? 'synced' : 'desynced');
  txt.textContent = synced ? 'Admin এর সাথে সিঙ্ক হয়েছে ✓' : 'সিঙ্ক হচ্ছে...';
}

// ====== LOAD VIDEO ======
window.adminLoadVideo = function(){
  const url = document.getElementById('urlInput').value.trim();
  if(!url){ return; }

  if(url.includes('youtube.com') || url.includes('youtu.be')){
    let videoId = '';
    try{ const u=new URL(url); videoId=u.searchParams.get('v')||u.pathname.split('/').pop(); }catch(e){}
    if(!videoId){ addSystemMsg('YouTube ID পাওয়া গেলো না', 'error'); return; }
    currentVideoUrl = url;
    loadVideoUrl(url, true);
    set(ref(db,'room/videoState'),{ url, isYT:true, playing:true, currentTime:0, serverTime:Date.now() });
    addSystemMsg('YouTube ভিডিও লোড হয়েছে 🎥');
    return;
  }

  currentVideoUrl = url;
  loadVideoUrl(url, false);
  set(ref(db,'room/videoState'),{ url, isYT:false, playing:false, currentTime:0, serverTime:Date.now() });
  addSystemMsg('ভিডিও লোড হয়েছে ▶');
};

function loadVideoUrl(url, isYT){
  document.getElementById('idleScreen').style.display = 'none';
  if(isYT){
    let videoId = '';
    try{ const u=new URL(url); videoId=u.searchParams.get('v')||u.pathname.split('/').pop(); }catch(e){}
    videoEl.style.display = 'none';
    ytFrame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&enablejsapi=1`;
    ytFrame.style.display = 'block';
    document.getElementById('adminControls').classList.add('hidden');
    if(isAdmin) addSystemMsg('YouTube: Admin controls সীমিত (YouTube API সীমাবদ্ধতা)', 'warn');
  } else {
    ytFrame.style.display = 'none';
    ytFrame.src = '';
    videoEl.src = url;
    videoEl.style.display = 'block';
    videoEl.load();
    if(!isAdmin){ videoEl.play().catch(()=>{}); }

    videoEl.ontimeupdate = () => {
      updateSeekBar();
      if(isAdmin) {
        // push every 3 seconds
        if(Math.floor(videoEl.currentTime) % 3 === 0 && Math.floor(videoEl.currentTime) !== Math.floor(lastKnownTime)){
          lastKnownTime = videoEl.currentTime;
          pushVideoState();
        }
      }
    };
    videoEl.onplay = () => { if(isAdmin){ document.getElementById('playPauseBtn').textContent='⏸'; pushVideoState(); } };
    videoEl.onpause = () => { if(isAdmin){ document.getElementById('playPauseBtn').textContent='▶'; pushVideoState(); } };
    videoEl.ondurationchange = () => {
      document.getElementById('durationDisplay').textContent = formatTime(videoEl.duration);
    };
  }
}

// ====== ADMIN CONTROLS ======
window.adminPlayPause = function(){
  if(!isAdmin) return;
  if(videoEl.paused){ videoEl.play(); } else { videoEl.pause(); }
  pushVideoState();
};

window.adminSeek = function(delta){
  if(!isAdmin) return;
  videoEl.currentTime = Math.max(0, videoEl.currentTime + delta);
  pushVideoState();
};

window.adminSeekTo = function(e){
  if(!isAdmin) return;
  const track = document.getElementById('seekTrack');
  const rect = track.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  videoEl.currentTime = pct * (videoEl.duration || 0);
  pushVideoState();
};

window.setVolume = function(v){ videoEl.volume = v; };
window.toggleMute = function(){
  isMuted = !isMuted;
  videoEl.muted = isMuted;
  document.querySelector('.vol-icon').textContent = isMuted ? '🔇' : '🔊';
};

function updateSeekBar(){
  const dur = videoEl.duration || 0;
  const ct = videoEl.currentTime || 0;
  const pct = dur ? (ct/dur)*100 : 0;
  document.getElementById('seekFilled').style.width = pct + '%';
  document.getElementById('seekThumb').style.right = 'auto';
  document.getElementById('seekThumb').style.left = pct + '%';
  document.getElementById('currentTimeDisplay').textContent = formatTime(ct);
}

function formatTime(s){
  if(isNaN(s)) return '0:00';
  const m = Math.floor(s/60);
  const sec = Math.floor(s%60);
  return m + ':' + sec.toString().padStart(2,'0');
}

// ====== CHAT ======
window.chatKeydown = function(e){
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendChat(); }
};

window.sendChat = function(){
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  const msgRef = ref(db,'room/chat');
  push(msgRef,{ name:myName, role:isAdmin?'admin':'viewer', text, ts:Date.now() });
};

function appendChatMsg(m, id){
  const box = document.getElementById('messagesBox');
  const el = document.createElement('div');
  el.className = 'msg';
  el.dataset.msgid = id;
  const avatar = getAvatar(m.name || '?');
  el.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-body">
      <div class="msg-name ${m.role==='admin'?'admin-name':'viewer-name'}">${escHtml(m.name)} ${m.role==='admin'?'👑':''}</div>
      <div class="msg-text">${escHtml(m.text)}</div>
    </div>`;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}

function addSystemMsg(text){
  const box = document.getElementById('messagesBox');
  const el = document.createElement('div');
  el.className = 'msg-system';
  el.textContent = '— ' + text + ' —';
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}

function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ====== VIEWERS ======
function renderViewers(users){
  const tab = document.getElementById('viewersTab');
  tab.innerHTML = '';
  Object.values(users).forEach(u => {
    const el = document.createElement('div');
    el.className = 'viewer-item';
    el.innerHTML = `
      <div class="v-avatar">${getAvatar(u.name||'?')}</div>
      <div>
        <div class="v-name">${escHtml(u.name)}</div>
        <div class="v-role ${u.role}">${u.role==='admin'?'Admin 👑':'Viewer'}</div>
      </div>`;
    tab.appendChild(el);
  });
}

// ====== VOICE CHAT (WebRTC) ======
window.toggleVoice = async function(){
  if(!isVoiceActive){
    try{
      voiceStream = await navigator.mediaDevices.getUserMedia({audio:true,video:false});
      isVoiceActive = true;
      const btn = document.getElementById('voiceBtn');
      btn.textContent = '🔴 ভয়েস বন্ধ করো';
      btn.classList.add('active');
      set(ref(db,`room/voice/${myId}`),{ name:myName, speaking:false });
      onDisconnect(ref(db,`room/voice/${myId}`)).remove();

      // Detect speaking
      const ctx = new AudioContext();
      const analyser = ctx.createAnalyser();
      const src = ctx.createMediaStreamSource(voiceStream);
      src.connect(analyser);
      analyser.fftSize = 512;
      const data = new Uint8Array(analyser.frequencyBinCount);
      let speakingState = false;
      setInterval(()=>{
        analyser.getByteFrequencyData(data);
        const avg = data.reduce((a,b)=>a+b,0)/data.length;
        const isSpeaking = avg > 15;
        if(isSpeaking !== speakingState){
          speakingState = isSpeaking;
          set(ref(db,`room/voice/${myId}/speaking`), isSpeaking);
        }
      },200);

      addSystemMsg(myName + ' ভয়েসে যোগ দিলেন 🎤');
    } catch(e){
      alert('মাইক্রোফোন অ্যাক্সেস পাওয়া যায়নি: ' + e.message);
    }
  } else {
    if(voiceStream) voiceStream.getTracks().forEach(t=>t.stop());
    isVoiceActive = false;
    const btn = document.getElementById('voiceBtn');
    btn.textContent = '🎤 ভয়েস চ্যাট চালু করো';
    btn.classList.remove('active');
    remove(ref(db,`room/voice/${myId}`));
    addSystemMsg(myName + ' ভয়েস থেকে বের হলেন');
  }
};

function renderVoiceUsers(voices){
  const box = document.getElementById('voiceUsers');
  const keys = Object.keys(voices);
  if(keys.length === 0){
    box.innerHTML = '<span class="voice-empty">কেউ কথা বলছে না...</span>';
    return;
  }
  box.innerHTML = '';
  keys.forEach(k => {
    const v = voices[k];
    const el = document.createElement('div');
    el.className = 'voice-user' + (v.speaking?' speaking':'');
    el.innerHTML = `<div class="voice-dot"></div><span>${escHtml(v.name)}</span>`;
    box.appendChild(el);
  });
}

// ====== TABS ======
window.switchTab = function(tab, btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('chatTab').style.display = tab==='chat' ? 'flex' : 'none';
  document.getElementById('viewersTab').classList.toggle('hidden', tab!=='viewers');
};

// Sync poll every 5s for viewers
setInterval(()=>{
  if(!isAdmin && videoEl.src && !videoEl.paused){
    // re-read latest state from Firebase to stay in sync
  }
}, 5000);
